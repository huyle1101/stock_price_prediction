version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__SECRET_KEY: ${AIRFLOW__CORE__SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__SMTP__SMTP_HOST: ${SMTP_HOST}
    AIRFLOW__SMTP__SMTP_PORT: ${SMTP_PORT}
    AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_USER}
    AIRFLOW__SMTP__SMTP_SSL: "false"
    AIRFLOW__SMTP__SMTP_STARTTLS: "true"
  volumes:
    - ./dags:/opt/airflow/dags                                        # DAG files
    - ./logs/airflow:/opt/airflow/logs                                # Airflow task logs
    - ./src:/opt/airflow/src                                          # shared source code
    - ./data:/opt/airflow/data                                        # shared data dir
    - ./models:/opt/airflow/models                                    # shared model artifacts
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - stocknet

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: stock_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db:/var/lib/postgresql/data                                  # maps to project db/ folder
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql            # auto-run on first start
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stocknet

  # ── MinIO ───────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: stock_minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./data:/data                                                   # maps to project data/ folder
    ports:
      - "9000:9000"     # S3-compatible API
      - "9001:9001"     # MinIO web console at http://localhost:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stocknet

  # ── Airflow init — chạy 1 lần để setup DB và tạo admin user ────────
  airflow-init:
    <<: *airflow-common
    container_name: stock_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USERNAME} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} || true
    restart: "no"

  # ── Airflow webserver ───────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: stock_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"     # Airflow UI at http://localhost:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow scheduler ───────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: stock_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Pipeline — ingestion + inference + fill actuals ─────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock_pipeline
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      MINIO_HOST: minio
    volumes:
      - ./src:/app/src                                                 # source code
      - ./data:/app/data                                               # read/write data files
      - ./models:/app/models                                           # read/write model artifacts
      - ./logs/pipeline:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stocknet

  # ── Streamlit UI ────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock_streamlit
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      MINIO_HOST: minio
    # LƯU Ý: Cập nhật đường dẫn 'src/app.py' thành file chạy Streamlit thực tế của bạn
    command: ["streamlit", "run", "src/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"     # Streamlit UI at http://localhost:8501
    volumes:
      - ./src:/app/src                                                 # source code
      - ./data:/app/data                                               # read data for dashboard
      - ./models:/app/models                                           # read models for real-time inference (if needed)
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stocknet

networks:
  stocknet:
    driver: bridge